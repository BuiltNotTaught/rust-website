{% extends "base.html" %}
{% block title %}{{ post.title }}{% endblock %}
{% block tagline %} {% endblock %}
{% block content %}
<article class="post">
  <h1>{{ post.title }}</h1>
  <p class="emeta">{{ post.created_at }}</p>
  <div class="post-content">{{ post.content }}</div>
</article>
<p class="more"><a href="/blog">← back to blog</a></p>
{% endblock %}
