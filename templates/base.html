<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- EDIT: your site description (shown in search results) -->
<meta name="description" content="A minimal Rust + Axum website template. No JavaScript frameworks, no web fonts, one inline stylesheet.">
<meta name="theme-color" content="#0b0f0d" media="(prefers-color-scheme:dark)">
<meta name="theme-color" content="#fbfdfb" media="(prefers-color-scheme:light)">
<title>{% block title %}Your Site{% endblock %}</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px;-webkit-text-size-adjust:100%}
/* EDIT: the whole colour system lives here. Change --accent for a different look.
   Both light and dark are defined; the browser picks based on the visitor's OS.
   Contrast note: --faint is the lightest text used. The values below pass
   WCAG AA (4.5:1) against --bg in BOTH modes. If you change them, re-check. */
:root{
  color-scheme:light dark;
  --bg:#0b0f0d;--panel:#0e1512;--fg:#d1fae5;--muted:#9db3a8;--faint:#6f8479;
  --line:#17211b;--hair:#121a15;--accent:#34d399;--accent-ink:#04120c;--sel:#0f1c15;
}
@media (prefers-color-scheme:light){:root{
  --bg:#fbfdfb;--panel:#f2f7f3;--fg:#052e1b;--muted:#4b6357;--faint:#62786d;
  --line:#e6efe9;--hair:#eef4f0;--accent:#059669;--accent-ink:#ffffff;--sel:#eef7f1;
}}
body{background:var(--bg);color:var(--fg);line-height:1.6;
  font-family:ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;
  -webkit-font-smoothing:antialiased}
.wrap{max-width:720px;margin:0 auto;padding:0 20px;width:100%}
header.site{display:flex;align-items:baseline;justify-content:space-between;gap:10px 18px;flex-wrap:wrap;padding:22px 20px 6px;max-width:720px;margin:0 auto}
.brand{font-size:15px;font-weight:700;color:var(--fg);text-decoration:none;letter-spacing:-.01em}
.brand b{color:var(--accent);font-weight:700}
nav.top{display:flex;gap:14px;flex-wrap:wrap}
nav.top a{font-size:13px;color:var(--faint);text-decoration:none}
nav.top a:hover{color:var(--accent)}
.tagline{color:var(--muted);font-size:13px;padding:2px 20px 14px;max-width:720px;margin:0 auto;border-bottom:1px solid var(--line)}
main{max-width:720px;margin:0 auto;padding:22px 20px 44px;min-height:58vh;width:100%}
h1{font-size:22px;font-weight:700;color:var(--fg);margin:0 0 6px;letter-spacing:-.01em}
h2{font-size:15px;font-weight:700;color:var(--fg);margin:30px 0 10px}
h2::before{content:"## ";color:var(--accent)}
h3{font-size:14px;font-weight:700;color:var(--fg);margin:0 0 5px}
p{color:var(--muted);font-size:13.5px;margin:0 0 12px;text-wrap:pretty}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
ul{padding-left:18px;color:var(--muted);font-size:13.5px;margin:0 0 12px}
li{margin:3px 0}
strong{color:var(--fg);font-weight:700}
.lead{margin:0 0 18px}
.idx{border-top:1px solid var(--line)}
.row{display:flex;align-items:baseline;gap:12px;padding:11px 4px;border-bottom:1px solid var(--hair);text-decoration:none;color:inherit}
.row:hover{background:var(--sel);text-decoration:none}
.row .num{color:var(--faint);font-size:12px;width:22px;flex:none}
.row .name{color:var(--fg);font-size:14px}
.row:hover .name{color:var(--accent)}
.row .desc{color:var(--faint);font-size:12px;margin-left:auto;text-align:right}
.more{margin:16px 0 0;font-size:13px;color:var(--faint)}
.proj{padding:14px 0;border-bottom:1px solid var(--hair)}
.stack{color:var(--faint);font-size:12px;margin:2px 0 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
.card{border:1px solid var(--line);border-radius:8px;padding:15px;background:var(--panel)}
.card h3{margin-bottom:8px}
.card ul{margin:0}
.entry{padding:14px 0;border-bottom:1px solid var(--hair)}
.etitle{font-size:15px;color:var(--fg);font-weight:700}
.etitle:hover{color:var(--accent)}
.emeta{display:block;color:var(--faint);font-size:12px;margin:2px 0 6px}
.muted{color:var(--faint)}
.btn{display:inline-block;padding:8px 15px;border:1px solid var(--accent);color:var(--accent);border-radius:7px;font-size:13px;font-family:inherit;cursor:pointer;background:none}
.btn:hover{background:var(--accent);color:var(--accent-ink);text-decoration:none}
.btn-solid{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.form{display:flex;flex-direction:column;gap:14px;max-width:460px;margin-top:16px}
label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px}
input,textarea{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--fg);
  font-family:inherit;font-size:13.5px;padding:9px 11px;border-radius:7px}
input:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:120px}
small{color:var(--faint);font-size:11.5px}
.post-content{color:var(--muted);font-size:14px;line-height:1.8;margin:16px 0}
.post-content p{font-size:14px}
footer.site{border-top:1px solid var(--line);margin-top:8px}
footer.site .inner{max-width:720px;margin:0 auto;padding:14px 20px;display:flex;justify-content:space-between;gap:8px 18px;flex-wrap:wrap;font-size:11.5px;color:var(--faint)}
footer.site a{color:var(--faint)}
footer.site a:hover{color:var(--accent)}
::selection{background:var(--accent);color:var(--accent-ink)}
@media (max-width:520px){header.site{padding-top:16px}nav.top{gap:12px}h1{font-size:20px}}</style>
</head>
<body>
<!-- EDIT: your site name. The <b> tags just colour the separators. -->
<header class="site" id="top"><a class="brand" href="/">your<b>·</b>site</a><nav class="top"><a href="/">home</a><a href="/about">about</a><a href="/work">work</a><a href="/blog">blog</a><a href="/contact">contact</a></nav></header>
<!-- EDIT: the default tagline. Any page can override it by defining its own
     tagline block (see how about.html does it). -->

<p class="tagline">{% block tagline %}a short tagline goes here{% endblock %}</p>
<main>
{% block content %}{% endblock %}
</main>
<!-- EDIT: footer text and links. -->
<footer class="site"><div class="inner"><span>© 2026 example.com</span><span><a href="https://example.com">link one</a> · <a href="https://example.com">link two</a></span></div></footer>
<a href="#top" class="totop" aria-label="Back to top" style="position:fixed;right:16px;bottom:16px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--muted);text-decoration:none;font-size:18px;line-height:1;z-index:50;opacity:0;pointer-events:none;transition:opacity .18s ease">↑</a><script>(function(){var b=document.querySelector('.totop'),t=document.getElementById('top');if(!b)return;if(!t||!('IntersectionObserver' in window)){b.style.opacity='1';b.style.pointerEvents='auto';return;}new IntersectionObserver(function(e){var on=!e[0].isIntersecting;b.style.opacity=on?'1':'0';b.style.pointerEvents=on?'auto':'none';}).observe(t);})();</script>
</body>
</html>
